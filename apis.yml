description: >-
  Cameron International (formerly Cooper Cameron Corporation) was a leading
  provider of flow equipment products, systems, and services to the worldwide
  oil, gas, and process industries. In 2016 the business was acquired by
  Schlumberger (now SLB) and its pressure-control, drilling, subsea, valves,
  measurement, and compression product lines were integrated into SLB's
  digital oilfield portfolio. Cameron-branded capabilities are now delivered
  and integrated through the SLB DELFI digital platform and its developer APIs
  rather than through a standalone Cameron developer program.
